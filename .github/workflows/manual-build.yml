name: Manual Build (Artifacts Only)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  BIN_NAME: otaripper
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
# =========================
# Linux Builds
# =========================
  linux-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            outname: linux-x86_64
          - target: x86_64-unknown-linux-musl
            outname: linux-static-x86_64
          - target: aarch64-unknown-linux-gnu
            outname: linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Configure ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"

          [env]
          CC_aarch64_unknown_linux_gnu="aarch64-linux-gnu-gcc"
          AR_aarch64_unknown_linux_gnu="aarch64-linux-gnu-ar"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          NAME="${BIN_NAME}-${{ matrix.outname }}"

          strip target/${{ matrix.target }}/release/${BIN_NAME} || true

          mkdir pkg
          cp target/${{ matrix.target }}/release/${BIN_NAME} README.md LICENSE pkg/
          tar -czf "$NAME.tar.gz" -C pkg .
          sha256sum "$NAME.tar.gz" > "$NAME.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: |
            *.tar.gz
            *.sha256

# =========================
# Windows Builds
# =========================
  windows-matrix:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            outname: windows-msvc-x86_64
          - target: x86_64-pc-windows-gnu
            outname: windows-gnu-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          NAME="${BIN_NAME}-${{ matrix.outname }}"

          mkdir pkg
          cp target/${{ matrix.target }}/release/${BIN_NAME}.exe README.md LICENSE pkg/
          7z a "$NAME.zip" ./pkg/*
          sha256sum "$NAME.zip" > "$NAME.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: |
            *.zip
            *.sha256

# =========================
# macOS Builds
# =========================
  macos-matrix:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            outname: macos-x86_64
          - target: aarch64-apple-darwin
            outname: macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          NAME="${BIN_NAME}-${{ matrix.outname }}"

          strip target/${{ matrix.target }}/release/${BIN_NAME} || true

          mkdir pkg
          cp target/${{ matrix.target }}/release/${BIN_NAME} README.md LICENSE pkg/
          tar -czf "$NAME.tar.gz" -C pkg .
          shasum -a 256 "$NAME.tar.gz" > "$NAME.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: |
            *.tar.gz
            *.sha256

# =========================
# Android (ARM64)
# =========================
  android-arm64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
        id: ndk

      - name: Build Android
        run: |
          TOOLCHAIN="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="$TOOLCHAIN/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/aarch64-linux-android24-clang"

          cargo build --release --target aarch64-linux-android

      - name: Package
        run: |
          NAME="${BIN_NAME}-android-arm64"

          llvm-strip target/aarch64-linux-android/release/${BIN_NAME} || true

          mkdir pkg
          cp target/aarch64-linux-android/release/${BIN_NAME} README.md LICENSE pkg/
          zip -j "$NAME.zip" pkg/*
          sha256sum "$NAME.zip" > "$NAME.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: android-arm64
          path: |
            *.zip
            *.sha256
