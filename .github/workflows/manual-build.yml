name: Manual Build (Artifacts Only)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  BIN_NAME: otaripper
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
# =========================
# Linux Builds
# =========================
  linux-matrix:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            outname: linux-x86_64
          - target: x86_64-unknown-linux-musl
            outname: linux-static-x86_64
          - target: aarch64-unknown-linux-gnu
            outname: linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Configure ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"

          [env]
          CC_aarch64_unknown_linux_gnu="aarch64-linux-gnu-gcc"
          AR_aarch64_unknown_linux_gnu="aarch64-linux-gnu-ar"
          EOF

      - name: Build Full
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Lite
        run: |
          cp target/${{ matrix.target }}/release/${BIN_NAME} target/${{ matrix.target }}/release/${BIN_NAME}-full
          cargo build --release --target ${{ matrix.target }} --no-default-features

      - name: Package
        shell: bash
        run: |
          NAME="${BIN_NAME}-${{ matrix.outname }}"

          strip target/${{ matrix.target }}/release/${BIN_NAME}-full || true
          strip target/${{ matrix.target }}/release/${BIN_NAME} || true

          mkdir -p "dist/$NAME"
          cp target/${{ matrix.target }}/release/${BIN_NAME}-full "dist/$NAME/${BIN_NAME}"
          cp target/${{ matrix.target }}/release/${BIN_NAME} "dist/$NAME/${BIN_NAME}-lite"
          cp README.md LICENSE "dist/$NAME/"
          
          # hash only the binaries
          cd "dist/$NAME"
          sha256sum "${BIN_NAME}" "${BIN_NAME}-lite" > "${NAME}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: dist/

# =========================
# Windows Builds
# =========================
  windows-matrix:
    runs-on: windows-latest
    if: github.event.repository.fork == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            outname: windows-msvc-x86_64
          - target: x86_64-pc-windows-gnu
            outname: windows-gnu-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Full
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Lite
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${BIN_NAME}.exe target/${{ matrix.target }}/release/${BIN_NAME}-full.exe
          cargo build --release --target ${{ matrix.target }} --no-default-features

      - name: Package
        shell: bash
        run: |
          NAME="${BIN_NAME}-${{ matrix.outname }}"

          mkdir -p "dist/$NAME"
          cp target/${{ matrix.target }}/release/${BIN_NAME}-full.exe "dist/$NAME/${BIN_NAME}.exe"
          cp target/${{ matrix.target }}/release/${BIN_NAME}.exe "dist/$NAME/${BIN_NAME}-lite.exe"
          cp README.md LICENSE "dist/$NAME/"
          
          cd "dist/$NAME"
          sha256sum "${BIN_NAME}.exe" "${BIN_NAME}-lite.exe" > "${NAME}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: dist/

# =========================
# macOS Builds
# =========================
  macos-matrix:
    runs-on: macos-latest
    if: github.event.repository.fork == false
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            outname: macos-x86_64
          - target: aarch64-apple-darwin
            outname: macos-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Full
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Lite
        run: |
          cp target/${{ matrix.target }}/release/${BIN_NAME} target/${{ matrix.target }}/release/${BIN_NAME}-full
          cargo build --release --target ${{ matrix.target }} --no-default-features

      - name: Package
        run: |
          NAME="${BIN_NAME}-${{ matrix.outname }}"

          strip target/${{ matrix.target }}/release/${BIN_NAME}-full || true
          strip target/${{ matrix.target }}/release/${BIN_NAME} || true

          mkdir -p "dist/$NAME"
          cp target/${{ matrix.target }}/release/${BIN_NAME}-full "dist/$NAME/${BIN_NAME}"
          cp target/${{ matrix.target }}/release/${BIN_NAME} "dist/$NAME/${BIN_NAME}-lite"
          cp README.md LICENSE "dist/$NAME/"
          
          cd "dist/$NAME"
          shasum -a 256 "${BIN_NAME}" "${BIN_NAME}-lite" > "${NAME}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.outname }}
          path: dist/

# =========================
# Android (ARM64)
# =========================
  android-arm64:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
        id: ndk

      - name: Build Full Android
        run: |
          TOOLCHAIN="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="$TOOLCHAIN/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/aarch64-linux-android24-clang"

          cargo build --release --target aarch64-linux-android

      - name: Build Lite Android
        run: |
          cp target/aarch64-linux-android/release/${BIN_NAME} target/aarch64-linux-android/release/${BIN_NAME}-full
          
          TOOLCHAIN="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="$TOOLCHAIN/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/aarch64-linux-android24-clang"

          cargo build --release --target aarch64-linux-android --no-default-features

      - name: Package
        run: |
          NAME="${BIN_NAME}-android-arm64"

          llvm-strip target/aarch64-linux-android/release/${BIN_NAME}-full || true
          llvm-strip target/aarch64-linux-android/release/${BIN_NAME} || true

          mkdir -p "dist/$NAME"
          cp target/aarch64-linux-android/release/${BIN_NAME}-full "dist/$NAME/${BIN_NAME}"
          cp target/aarch64-linux-android/release/${BIN_NAME} "dist/$NAME/${BIN_NAME}-lite"
          cp README.md LICENSE "dist/$NAME/"
          
          cd "dist/$NAME"
          sha256sum "${BIN_NAME}" "${BIN_NAME}-lite" > "${NAME}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: android-arm64
          path: dist/
