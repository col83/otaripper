name: Crates.io Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  publish:
    name: Publish to Crates.io
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check if version already published
        id: crates_check
        run: |
          PKG_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "Local version: $PKG_VERSION"
          
          # Check crates.io API
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://crates.io/api/v1/crates/otaripper/$PKG_VERSION")
            
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Version $PKG_VERSION is already live on crates.io — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $PKG_VERSION is not on crates.io — proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Crates.io
        if: steps.crates_check.outputs.skip == 'false'
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
