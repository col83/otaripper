name: AUR Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-aur:
    name: Update AUR (${{ matrix.package }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      matrix:
        package: [otaripper, otaripper-bin]
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm git openssh binutils sudo base-devel

      - name: Get version and check AUR
        id: get_data
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          VERSION="${TAG_NAME#v}"

          # Check if AUR already has this version
          AUR_VERSION=$(curl -s "https://aur.archlinux.org/rpc/?v=5&type=info&arg=${{ matrix.package }}" | sed -n 's/.*"Version":"\([^"]*\)".*/\1/p')
          echo "AUR version: $AUR_VERSION"
          echo "New version: $VERSION-1"

          # Temporarily forced to false for testing
          echo "skip=false" >> "$GITHUB_OUTPUT"

          if [ "${{ matrix.package }}" = "otaripper-bin" ]; then
            FILENAME="otaripper-${VERSION}-linux-static-x86_64.tar.gz"
            URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${FILENAME}"
          else
            FILENAME="${TAG_NAME}.tar.gz"
            URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"
          fi

          curl -L -o release_file "$URL"
          SHA256=$(sha256sum release_file | awk '{ print $1 }')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Update AUR repository
        if: steps.get_data.outputs.skip != 'true'
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # Use ssh-agent for more reliable key handling
          eval $(ssh-agent -s)
          ssh-add - <<< "$AUR_KEY"

          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          git config --global user.name "Syed Insaf"
          git config --global user.email "syedinsaf@proton.me"
          git config --global --add safe.directory '*'

          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no"
          git clone ssh://aur@aur.archlinux.org/${{ matrix.package }}.git aur_repo
          cd aur_repo

          # Update PKGBUILD using template from repo
          cp ../aur/${{ matrix.package }}/PKGBUILD .
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.get_data.outputs.version }}/" PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.get_data.outputs.sha256 }}/" PKGBUILD

          # Generate .SRCINFO
          useradd -m builder
          chown -R builder:builder .
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

          # Commit and Push
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to v${{ steps.get_data.outputs.version }}"
            git push origin master
          fi
